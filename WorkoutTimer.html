<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #0f1923;
  color: #e8e8e8;
  min-height: 100vh;
  padding: 16px;
}
.card {
  background: #1a2535;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 14px;
}
.card-label {
  font-size: 11px;
  color: #556;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.big-time {
  font-size: 48px;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  color: #fff;
  line-height: 1;
  margin-bottom: 14px;
  letter-spacing: -1px;
}
.ex-time {
  font-size: 36px;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  color: #fff;
  line-height: 1;
  letter-spacing: -1px;
}
.time-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.4s;
}
.dot-off    { background: #2a3a50; }
.dot-red    { background: #e74c3c; box-shadow: 0 0 6px #e74c3c88; }
.dot-yellow { background: #f1c40f; box-shadow: 0 0 6px #f1c40f88; }
.dot-green  { background: #2ecc71; box-shadow: 0 0 6px #2ecc7188; }

button {
  display: block;
  width: 100%;
  padding: 14px 18px;
  border-radius: 10px;
  border: 1.5px solid #2a3a50;
  background: #0f1923;
  color: #88aacc;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 8px;
  -webkit-tap-highlight-color: transparent;
}
button:active { opacity: 0.7; }
button.green  { background: #1a3a22; border-color: #2ecc71; color: #2ecc71; }
button.blue   { background: #1f3a5f; border-color: #4da6ff; color: #4da6ff; }
button.red    { background: #3a1a1a; border-color: #e74c3c; color: #e74c3c; }
button.hidden { display: none; }
button:disabled { opacity: 0.3; pointer-events: none; }

.btn-row { display: flex; gap: 8px; }
.btn-row button { flex: 1; }

.rec-box {
  background: #0a1018;
  border: 1.5px solid #2a3a50;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
  text-align: center;
  display: none;
}
.rec-box.visible { display: block; }
.rec-label { font-size: 11px; color: #556; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.rec-time {
  font-size: 52px;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: -2px;
  line-height: 1;
  transition: color 0.4s;
}
.rec-red    { color: #e74c3c; }
.rec-yellow { color: #f1c40f; }
.rec-green  { color: #2ecc71; }

.laps-label { font-size: 11px; color: #556; text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 8px; }
.lap-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 0.5px solid #1f2e3f;
  font-size: 14px;
}
.lap-row:last-child { border-bottom: none; }
.lap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.lap-num { color: #445; min-width: 28px; font-size: 12px; }
.lap-desc { color: #667; flex: 1; }
.lap-time { font-variant-numeric: tabular-nums; font-weight: 500; color: #ccc; }
.lap-badge { font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 500; margin-left: 4px; }
.empty-msg { text-align: center; color: #334; font-size: 13px; padding: 16px 0; }

.summary-card {
  display: none;
  background: #152230;
  border: 1px solid #2a3a50;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 14px;
}
.summary-title { font-size: 13px; font-weight: 600; color: #4da6ff; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
.sum-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 0.5px solid #1f2e3f;
  font-size: 13px; color: #88aacc;
}
.sum-row:last-child { border-bottom: none; }
.sum-val { font-variant-numeric: tabular-nums; font-weight: 600; color: #fff; }
.ex-block { background: #1a2535; border-radius: 10px; padding: 12px; margin: 8px 0; }
.ex-block-title { font-size: 13px; font-weight: 600; color: #4da6ff; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="card">
  <div class="card-label">Sessione</div>
  <div class="big-time" id="sessionTime">0:00:00</div>
  <div class="btn-row">
    <button class="blue" id="btnSession">Inizia sessione</button>
    <button class="red hidden" id="btnEndSession">Fine sessione</button>
  </div>
</div>

<div class="card">
  <div class="card-label">Esercizio corrente</div>
  <div class="time-row">
    <div class="dot dot-off" id="exDot"></div>
    <div class="ex-time" id="exTime">0:00</div>
  </div>
  <button class="blue" id="btnEx" disabled>Avvia esercizio</button>
  <button class="green hidden" id="btnCentrale">Fine serie</button>
  <button class="red hidden" id="btnFineEx">Fine esercizio</button>
  <div class="laps-label">Recuperi</div>
  <div id="lapsList"><div class="empty-msg">Avvia l'esercizio e segna le serie</div></div>
</div>

<div class="rec-box" id="recBox">
  <div class="rec-label">Recupero in corso</div>
  <div class="rec-time rec-red" id="recTime">0:00</div>
</div>

<div class="summary-card" id="summaryCard">
  <div class="summary-title">Riepilogo sessione</div>
  <div id="summaryContent"></div>
</div>

<script>
(function() {

  var sessionStart = null, sessionInterval = null, sessionRunning = false, sessionOffset = 0;
  var exStart = null, exInterval = null, exRunning = false;
  var recStart = null, recInterval = null;
  var lapStart = null;
  var currentLaps = [];
  var exercises = [];
  var serieCount = 0;
  var centraleState = 'serie'; // 'serie' | 'recupero'

  function fmt2(n) { return String(Math.floor(n)).padStart(2,'0'); }
  function fmtSession(ms) {
    var s = ms/1000, m = s/60, h = m/60;
    return Math.floor(h) + ':' + fmt2(m%60) + ':' + fmt2(s%60);
  }
  function fmtMin(ms) {
    var s = ms/1000, m = s/60;
    return Math.floor(m) + ':' + fmt2(s%60);
  }
  function lapColor(ms) {
    var s = ms/1000;
    if (s < 60)  return { dot:'#e74c3c', bg:'#3a1a1a', fg:'#ff8888', label:'< 1 min' };
    if (s < 120) return { dot:'#f1c40f', bg:'#3a3000', fg:'#ffe066', label:'1-2 min' };
    return               { dot:'#2ecc71', bg:'#1a3a1a', fg:'#88ee88', label:'> 2 min' };
  }

  // SESSION
  document.getElementById('btnSession').addEventListener('click', function() {
    if (!sessionRunning) {
      sessionStart = Date.now() - sessionOffset;
      sessionRunning = true;
      sessionInterval = setInterval(function() {
        document.getElementById('sessionTime').textContent = fmtSession(Date.now() - sessionStart);
      }, 500);
      document.getElementById('btnSession').textContent = 'Pausa';
      document.getElementById('btnSession').className = '';
      document.getElementById('btnEndSession').classList.remove('hidden');
      document.getElementById('btnEx').disabled = false;
    } else {
      sessionOffset = Date.now() - sessionStart;
      clearInterval(sessionInterval);
      sessionRunning = false;
      document.getElementById('btnSession').textContent = 'Riprendi';
      document.getElementById('btnSession').className = 'blue';
    }
  });

  document.getElementById('btnEndSession').addEventListener('click', function() {
    if (!confirm('Terminare la sessione?')) return;
    clearInterval(sessionInterval);
    clearInterval(exInterval);
    clearInterval(recInterval);
    var totalMs = Date.now() - sessionStart;
    if (exRunning) saveEx();
    sessionRunning = false; exRunning = false;
    document.getElementById('btnSession').disabled = true;
    document.getElementById('btnEndSession').classList.add('hidden');
    document.getElementById('btnEx').disabled = true;
    document.getElementById('btnCentrale').classList.add('hidden');
    document.getElementById('btnFineEx').classList.add('hidden');
    document.getElementById('recBox').classList.remove('visible');
    document.getElementById('sessionTime').textContent = fmtSession(totalMs);
    showSummary(totalMs);
  });

  // ESERCIZIO
  document.getElementById('btnEx').addEventListener('click', function() {
    if (!exRunning) {
      startEx();
    } else {
      if (!confirm('Reimpostare il timer esercizio?')) return;
      clearInterval(exInterval);
      clearInterval(recInterval);
      saveEx();
      startEx();
    }
  });

  function startEx() {
    exStart = Date.now();
    lapStart = null;
    exRunning = true;
    serieCount = 0;
    currentLaps = [];
    clearInterval(exInterval);
    clearInterval(recInterval);
    document.getElementById('recBox').classList.remove('visible');
    document.getElementById('exDot').className = 'dot dot-off';
    document.getElementById('exTime').textContent = '0:00';
    document.getElementById('btnEx').textContent = 'Reimposta esercizio';
    document.getElementById('btnEx').className = '';
    document.getElementById('btnFineEx').classList.remove('hidden');
    setCentrale('serie');
    renderLaps();
    exInterval = setInterval(function() {
      document.getElementById('exTime').textContent = fmtMin(Date.now() - exStart);
    }, 500);
  }

  function saveEx() {
    if (!exStart) return;
    var duration = Date.now() - exStart;
    var avgRec = 0;
    var recLaps = currentLaps.filter(function(l) { return l.ms > 0; });
    if (recLaps.length > 0) {
      avgRec = recLaps.reduce(function(a,l) { return a + l.ms; }, 0) / recLaps.length;
    }
    exercises.push({ num: exercises.length+1, duration: duration, serie: serieCount, laps: currentLaps.slice(), avgRec: avgRec });
  }

  document.getElementById('btnFineEx').addEventListener('click', function() {
    clearInterval(exInterval);
    clearInterval(recInterval);
    saveEx();
    exRunning = false;
    document.getElementById('recBox').classList.remove('visible');
    document.getElementById('btnEx').textContent = 'Avvia esercizio';
    document.getElementById('btnEx').className = 'blue';
    document.getElementById('btnCentrale').classList.add('hidden');
    document.getElementById('btnFineEx').classList.add('hidden');
    document.getElementById('exDot').className = 'dot dot-off';
    document.getElementById('exTime').textContent = '0:00';
    document.getElementById('lapsList').innerHTML = '<div class="empty-msg">Avvia l\'esercizio e segna le serie</div>';
  });

  // PULSANTE CENTRALE
  function setCentrale(state) {
    centraleState = state;
    var btn = document.getElementById('btnCentrale');
    btn.classList.remove('hidden');
    if (state === 'serie') {
      btn.textContent = 'Fine serie';
      btn.className = 'green';
    } else {
      btn.textContent = 'Nuova serie';
      btn.className = 'blue';
    }
  }

  document.getElementById('btnCentrale').addEventListener('click', function() {
    if (centraleState === 'serie') {
      fineSerie();
    } else {
      nuovaSerie();
    }
  });

  function fineSerie() {
    if (!exRunning) return;
    unlockAudio();
    serieCount++;
    currentLaps.push({ n: serieCount, ms: 0, color: null });
    lapStart = Date.now();
    // avvia timer recupero
    recStart = Date.now();
    clearInterval(recInterval);
    document.getElementById('recTime').textContent = '0:00';
    document.getElementById('recTime').className = 'rec-time rec-red';
    document.getElementById('recBox').classList.add('visible');
    var _beepDone = { 60: false, 120: false, 180: false };
    recInterval = setInterval(function() {
      var ms = Date.now() - recStart;
      var s = ms/1000;
      document.getElementById('recTime').textContent = fmtMin(ms);
      document.getElementById('recTime').className = 'rec-time ' + (s < 60 ? 'rec-red' : s < 120 ? 'rec-yellow' : 'rec-green');
      document.getElementById('exDot').className = 'dot ' + (s < 60 ? 'dot-red' : s < 120 ? 'dot-yellow' : 'dot-green');
      // beep ai minuti
      if (s >= 60  && !_beepDone[60])  { beep(1); vibra(1); _beepDone[60]  = true; }
      if (s >= 120 && !_beepDone[120]) { beep(2); vibra(2); _beepDone[120] = true; }
      if (s >= 180 && !_beepDone[180]) { beep(3); vibra(3); _beepDone[180] = true; }
    }, 500);
    setCentrale('recupero');
    renderLaps();
  }

  function nuovaSerie() {
    if (!exRunning) return;
    var lapMs = lapStart ? Date.now() - lapStart : 0;
    var c = lapColor(lapMs);
    if (currentLaps.length > 0) {
      currentLaps[currentLaps.length-1].ms = lapMs;
      currentLaps[currentLaps.length-1].color = c;
    }
    clearInterval(recInterval);
    recStart = null;
    lapStart = null;
    document.getElementById('recBox').classList.remove('visible');
    document.getElementById('exDot').className = 'dot dot-off';
    setCentrale('serie');
    renderLaps();
  }

  function renderLaps() {
    var list = document.getElementById('lapsList');
    if (!currentLaps.length) {
      list.innerHTML = '<div class="empty-msg">Avvia l\'esercizio e segna le serie</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < currentLaps.length; i++) {
      var l = currentLaps[i];
      var isFirst = i === 0;
      var hasRec = l.ms > 0 && l.color;
      html += '<div class="lap-row">' +
        '<div class="lap-dot" style="background:' + (hasRec ? l.color.dot : '#334') + '"></div>' +
        '<span class="lap-num">S' + l.n + '</span>';
      if (hasRec) {
        html += '<span class="lap-desc">recupero</span>' +
          '<span class="lap-time">' + fmtMin(l.ms) + '</span>' +
          '<span class="lap-badge" style="background:' + l.color.bg + ';color:' + l.color.fg + '">' + l.color.label + '</span>';
      } else {
        html += '<span class="lap-desc" style="color:#445">in corso...</span>';
      }
      html += '</div>';
    }
    list.innerHTML = html;
  }

  var _audioCtx = null;

  function unlockAudio() {
    // Crea e sblocca l'AudioContext dentro un evento utente diretto
    if (_audioCtx) return;
    try {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // iOS richiede un suono silenzioso per sbloccare il contesto
      var buf = _audioCtx.createBuffer(1, 1, 22050);
      var src = _audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(_audioCtx.destination);
      src.start(0);
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
    } catch(e) { _audioCtx = null; }
  }

  function beep(times) {
    if (!_audioCtx) return;
    try {
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      var delay = 0;
      for (var i = 0; i < times; i++) {
        (function(d) {
          var osc = _audioCtx.createOscillator();
          var gain = _audioCtx.createGain();
          osc.connect(gain);
          gain.connect(_audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0, _audioCtx.currentTime + d);
          gain.gain.linearRampToValueAtTime(0.5, _audioCtx.currentTime + d + 0.01);
          gain.gain.linearRampToValueAtTime(0, _audioCtx.currentTime + d + 0.15);
          osc.start(_audioCtx.currentTime + d);
          osc.stop(_audioCtx.currentTime + d + 0.2);
        })(delay);
        delay += 0.28;
      }
    } catch(e) {}
  }

  function vibra(times) {
    if (!navigator.vibrate) return;
    var pattern = [];
    for (var i = 0; i < times; i++) {
      if (i > 0) pattern.push(150); // pausa tra vibrazioni
      pattern.push(200);             // durata vibrazione
    }
    navigator.vibrate(pattern);
  }

  function showSummary(totalMs) {
    var card = document.getElementById('summaryCard');
    card.style.display = '';
    var html = '<div class="sum-row"><span>Durata totale</span><span class="sum-val">' + fmtSession(totalMs) + '</span></div>';
    html += '<div class="sum-row"><span>Esercizi</span><span class="sum-val">' + exercises.length + '</span></div>';
    for (var i = 0; i < exercises.length; i++) {
      var ex = exercises[i];
      html += '<div class="ex-block">';
      html += '<div class="ex-block-title">Esercizio ' + ex.num + '</div>';
      html += '<div class="sum-row"><span>Durata</span><span class="sum-val">' + fmtMin(ex.duration) + '</span></div>';
      html += '<div class="sum-row"><span>Serie</span><span class="sum-val">' + ex.serie + '</span></div>';
      if (ex.avgRec > 0) {
        html += '<div class="sum-row"><span>Recupero medio</span><span class="sum-val">' + fmtMin(ex.avgRec) + '</span></div>';
      }
      html += '</div>';
    }
    document.getElementById('summaryContent').innerHTML = html;
    card.scrollIntoView({ behavior: 'smooth' });
  }

})();
</script>
</body>
</html>
